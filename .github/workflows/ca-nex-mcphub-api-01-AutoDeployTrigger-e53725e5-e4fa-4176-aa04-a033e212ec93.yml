name: Deploy API to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CANEXMCPHUB01_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CANEXMCPHUB01_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CANEXMCPHUB01_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: <ACR_NAME>.azurecr.io
          username: ${{ secrets.CANEXMCPHUB01_REGISTRY_USERNAME }}
          password: ${{ secrets.CANEXMCPHUB01_REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t <ACR_NAME>.azurecr.io/ca-nex-mcphub-01:${{ github.sha }} \
            .
          docker push <ACR_NAME>.azurecr.io/ca-nex-mcphub-01:${{ github.sha }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ca-nex-mcphub-01 \
            --resource-group rg-nex-test-play-uks-001 \
            --image <ACR_NAME>.azurecr.io/ca-nex-mcphub-01:${{ github.sha }}
