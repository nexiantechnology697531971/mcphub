name: Trigger auto deployment for ca-nex-mcphub-api-01

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/ca-nex-mcphub-api-01-AutoDeployTrigger-e53725e5-e4fa-4176-aa04-a033e212ec93.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CANEXMCPHUBAPI01_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CANEXMCPHUBAPI01_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CANEXMCPHUBAPI01_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: nexianmcphub01.azurecr.io
          username: ${{ secrets.CANEXMCPHUBAPI01_REGISTRY_USERNAME }}
          password: ${{ secrets.CANEXMCPHUBAPI01_REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t nexianmcphub01.azurecr.io/ca-nex-mcphub-api-01:${{ github.sha }} \
            .
          docker push nexianmcphub01.azurecr.io/ca-nex-mcphub-api-01:${{ github.sha }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ca-nex-mcphub-api-01 \
            --resource-group rg-nex-test-play-uks-001 \
            --image nexianmcphub01.azurecr.io/ca-nex-mcphub-api-01:${{ github.sha }}
