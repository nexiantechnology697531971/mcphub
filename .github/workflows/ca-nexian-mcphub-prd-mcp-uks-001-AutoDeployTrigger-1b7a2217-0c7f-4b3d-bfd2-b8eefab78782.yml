name: Deploy ca-nexian-mcphub-prd-mcp-uks-001

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CANEXMCPHUBAPI01_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CANEXMCPHUBAPI01_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CANEXMCPHUBAPI01_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: nexianmcphub01.azurecr.io
          username: ${{ secrets.CANEXMCPHUBAPI01_REGISTRY_USERNAME }}
          password: ${{ secrets.CANEXMCPHUBAPI01_REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          docker build \
            -f apps/mcp/Dockerfile \
            -t nexianmcphub01.azurecr.io/ca-nexian-mcphub-prd-mcp-uks-001:${{ github.sha }} \
            .
          docker push nexianmcphub01.azurecr.io/ca-nexian-mcphub-prd-mcp-uks-001:${{ github.sha }}

      - name: Configure ACR registry on Container App
        run: |
          az containerapp registry set \
            --name ca-nexian-mcphub-prd-mcp-uks-001 \
            --resource-group rg-nex-test-play-uks-001 \
            --server nexianmcphub01.azurecr.io \
            --username ${{ secrets.CANEXMCPHUBAPI01_REGISTRY_USERNAME }} \
            --password ${{ secrets.CANEXMCPHUBAPI01_REGISTRY_PASSWORD }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ca-nexian-mcphub-prd-mcp-uks-001 \
            --resource-group rg-nex-test-play-uks-001 \
            --image nexianmcphub01.azurecr.io/ca-nexian-mcphub-prd-mcp-uks-001:${{ github.sha }}
