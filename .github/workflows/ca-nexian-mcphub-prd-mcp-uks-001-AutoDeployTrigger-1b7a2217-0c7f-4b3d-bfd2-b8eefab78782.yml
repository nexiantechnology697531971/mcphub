name: Trigger auto deployment for ca-nexian-mcphub-prd-mcp-uks-001

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ca-nexian-mcphub-prd-mcp-uks-001-AutoDeployTrigger-1b7a2217-0c7f-4b3d-bfd2-b8eefab78782.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CANEXIANMCPHUBPRDMCPUKS001_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CANEXIANMCPHUBPRDMCPUKS001_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CANEXIANMCPHUBPRDMCPUKS001_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}apps/mcp
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: nexianmcphub01.azurecr.io
          registryUsername: ${{ secrets.CANEXIANMCPHUBPRDMCPUKS001_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CANEXIANMCPHUBPRDMCPUKS001_REGISTRY_PASSWORD }}
          containerAppName: ca-nexian-mcphub-prd-mcp-uks-001
          resourceGroup: rg-nex-test-play-uks-001
          imageToBuild: nexianmcphub01.azurecr.io/ca-nexian-mcphub-prd-mcp-uks-001:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


